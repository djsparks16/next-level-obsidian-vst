name: Windows Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows VST3 and Standalone
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel

      - name: List build artefacts
        shell: pwsh
        run: |
          Get-ChildItem -Path build -Recurse -Include *.vst3,*.exe | Select-Object FullName

      - name: Upload VST3 artefact
        uses: actions/upload-artifact@v4
        with:
          name: Obsidian-Windows-VST3
          path: build/Obsidian_artefacts/Release/VST3/Obsidian.vst3
          if-no-files-found: error

      - name: Upload Standalone artefact
        uses: actions/upload-artifact@v4
        with:
          name: Obsidian-Windows-Standalone
          path: build/Obsidian_artefacts/Release/Standalone/Obsidian.exe
          if-no-files-found: error
